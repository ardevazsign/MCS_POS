    <script>
        // Modal Hide & Show
        const calendarModal = document.getElementById('calendarModal');
        const modal = document.getElementById('myModal');

        // Show modal
        function showModal() {
            modal.style.display = 'block';
        }
        function openCalendar(){
          calendarModal.style.display = 'block';
        }
        // Hide Modal
        function hideModal() {
            modal.style.display = 'none';
        }
        function hideCalendar() {
          calendarModal.style.display = 'none';
        }
        // close when click outside modal
        window.onclick = function(event) {
            if (event.target === modal) {
                hideModal();
            }
        }
        window.onclick = function(e) {
            if (e.target === calendarModal) {
                hideCalendar();
            }
        }
        // close when ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                hideModal();
            }
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hideCalendar();
            }
        });
        // ----------------------------- for settings ---------


const allIds = [
  "totalDisplay",
  "savedDisplay",
  "clock",
  "mainDisplay",
  "calculatorInput",
  "monitorInput"
];

// Toggle Theme
function toggleTheme(idName) {
  const display = document.getElementById(idName);

  // toggle dark class
  display.classList.toggle("dark");

  // save theme
  const theme = display.classList.contains("dark")
    ? "dark"
    : "light";

  localStorage.setItem(idName + "Theme", theme);
}

// Load Saved Themes
function loadThemes() {
  allIds.forEach(id => {
    const display = document.getElementById(id);

    if (!display) return;

    const savedTheme = localStorage.getItem(id + "Theme");

    // checkbox
    const checkbox = document.querySelector(
      `input[onchange="toggleTheme('${id}')"]`
    );

    if (savedTheme === "dark") {
      display.classList.add("dark");

      if (checkbox) {
        checkbox.checked = true;
      }
    } else {
      display.classList.remove("dark");

      if (checkbox) {
        checkbox.checked = false;
      }
    }
  });
}

// Run when page loads
window.addEventListener("DOMContentLoaded", loadThemes);

document.getElementById('copyYear').textContent = new Date().getFullYear();

// ==============================================================Calendar

   let currentDate = new Date();
        let selectedDate = null;

        const monthYear = document.getElementById('monthYear');
        const daysContainer= document.getElementById('days');

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Month name + year to header
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November","December"];

            monthYear.textContent = `${monthNames[month]} ${year}`;


            //  First day ng month at total days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            daysContainer.innerHTML = ''; 


            // Previous month 

            for (let i = firstDay; i > 0;  i--) {
                const day = document.createElement('div');
                day.textContent = daysInPrevMonth - i + 1;
                day.classList.add('other-month');
                daysContainer.appendChild(day);
            }

            // current month days
            const today = new Date();
            for(let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                day.textContent = i;

                // Highlight today
                if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    day.classList.add('today');
                }

                // Click to select date
                day.addEventListener('click', () => {
                    selectedDate = new Date(year, month, i);
                    document.querySelectorAll(' .days div').forEach(d => d.classList.remove('selected'));
                    day.classList.add('selected');
                    alert(`Selected: ${selectedDate.toDateString()}`);
                });
                daysContainer.appendChild(day);
            }

            // Next month na days para mapuno 6 rows
            const totalCells = firstDay + daysInMonth;
            const nextDays = totalCells > 35 ? 42 - totalCells : 35 - totalCells;

            for (let i = 1; i <= nextDays; i++) {
                const day = document.createElement('div');
                day.textContent = 1;
                day.classList.add('other-month');
                daysContainer.appendChild(day);
            }
        }

        // Next month
        document.getElementById('nextBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // Previous month
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        // Initial render
        renderCalendar();
