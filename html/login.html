    <div class="main-container">
      <!-- Login Page -->
       <div id="loginPage" class="container">
         <h2>POS Login</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="login()">Login</button>
        <button class="admin-btn" onclick="showAdminLogin()">Admin Panel</button>
        <div id="loginMsg"></div>
       </div>

       <!-- Admin Login Page -->
        <div id="adminLoginPage" class="container hidden">
          <h2>Admin Login</h2>
          <input type="text" id="adminUser" placeholder="Admin Username">
          <input type="password" id="adminPass" placeholder="Admin Password"> 
          <button onclick="adminLogin()">Login as Admin</button>
          <button onclick="showLogin()">Back to POS Login</button>
          <div id="adminLoginMsg"></div>
        </div>

        <!-- Admin Panel -->
         <div id='adminPanel' class="container hidden">
          <h2>Admin Panel</h2>
          <h3>Register POS User</h3>
          <input type="text " id="newUser" placeholder="New Username">
          <input type="password" id="newPass" placeholder="New Password">
          <button onclick="registerUser()">Add User</button>
          <div id="registerMsg"></div>

          <h3>Registered Users</h3>
          <div id="userList"></div>

          <button class="logout-btn" onclick="adminLogout()">Logout Admin</button>
         </div>

         <!-- POS Dashboard -->
         <div id="posPage" class="container hidden">
            <h2>
              POS Dashboard
            </h2>
            <p> Welcome, <span id="currentUser">
              
            </span> !</p>
            <p>to our POS System</p>
            <button class="logout-btn " onclick="logout()">Logout</button>
         </div>   

    </div>
