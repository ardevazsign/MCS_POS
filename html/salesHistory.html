      body {

      .history-content{

      .historyListHolder{
        margin-left: 60px;

      .itemHolder {
        background-color: rgb(128, 128, 128);
        width: 400px;
        align-items: center;
        column-gap: 10px;
        justify-content: center;
        padding: 5px;
        border: 1px solid #ddd;
        margin-bottom: 8px;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
        /* display */
        flex-shrink: 0;
        display: inline-flex;
        height: 100%;
        padding: 5px 0 5px 0px;
      }
      .empty {
        text-align: center;
        color: #777;
        padding: 20px;
      }
      .timeHistory{
        border-radius: 2px;
        font-size: 12px;
        padding: 4px 0;
        text-align: center;
        width: 150px;
        background-color: black;
        color: white;
      }
      .value{
        padding: 2px 0;
        border-radius: 2px;
        text-align: center;
         color: black;
        width: 120px;
        background-color: white;
      }
      .deleteBtn {
        border: 1px solid white;
        background: blueviolet;
        color: white;
        box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.4);
        padding: 5px 10px;
        cursor: pointer;
      }
      .deleteBtn:hover{
        background: red;
        color: white;
      }
      .total {
        width: 200px;
        z-index: 1001;
        position: fixed;
        bottom: 5%;
        left: 44%;
        padding: 5px 0;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
        background-color: black;
        color: white;
        border: 1px solid white;
        font-size: 20px;
        margin-top: 20px;
